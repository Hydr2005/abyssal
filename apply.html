<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Solicitud Staff</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="form-container">

<h1>Solicitud Staff Abyssal</h1>

<form id="applyForm">

<label>¿Cuántos años tienes?</label>
<input type="text" id="edad" required>

<label>¿Cuál es tu nombre en Discord?</label>
<input type="text" id="discord" required>

<label>Dos miembros de Abyssal comienzan una discusión fuerte en público dentro del servidor, y la comunidad empieza a tomar bandos. Ambos aportan mucho al proyecto y expulsar a alguno podría generar problemas. ¿Cómo manejarías la situación?</label>
<textarea id="pregunta1" required></textarea>

<label>Descubres que alguien del equipo está filtrando información interna del staff de Abyssal a otra comunidad o servidor. No tienes pruebas completamente concluyentes, pero varios indicios apuntan a esa persona. ¿Qué harías?</label>
<textarea id="pregunta2" required></textarea>

<label>El staff decide implementar una regla nueva que mejora la organización de la comunidad, pero la mayoría de los miembros está en contra y empieza a protestar. Si fueras parte del equipo que debe aplicarla, ¿cómo manejarías la situación?</label>
<textarea id="pregunta3" required></textarea>

<label>Un miembro del staff empieza a usar sus permisos de forma injusta (muteos, baneos o favoritismo), pero es amigo cercano de varios administradores. ¿Cómo actuarías sin provocar un conflicto mayor dentro del equipo?</label>
<textarea id="pregunta4" required></textarea>

<button type="submit">Enviar solicitud</button>

</form>

</div>

<script>

const webhook = "https://discord.com/api/webhooks/1479434819267199047/xlL5ulI0lMyGduFZI1mP33QwF9qNYkXH0GQhxUyEHLRufsPr5Z-gzyyur457wnXM57S3";

document.getElementById("applyForm").addEventListener("submit", function(e){

e.preventDefault()

const user = JSON.parse(localStorage.getItem("discordUser"))

const edad = document.getElementById("edad").value
const discord = document.getElementById("discord").value
const p1 = document.getElementById("pregunta1").value
const p2 = document.getElementById("pregunta2").value
const p3 = document.getElementById("pregunta3").value
const p4 = document.getElementById("pregunta4").value

fetch(webhook,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body: JSON.stringify({

content: `📩 **Nueva solicitud staff**

👤 Usuario: ${user.username}#${user.discriminator}

Edad: ${edad}

Discord escrito: ${discord}

1️⃣ ${p1}

2️⃣ ${p2}

3️⃣ ${p3}

4️⃣ ${p4}`

})

})

alert("Solicitud enviada")

})

</script>

</body>
</html>
