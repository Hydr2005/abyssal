<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Abyssal Apply</title>

<style>

body{
background:
linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.9)),
url("fondo.gif") center/cover no-repeat fixed;

color:white;
font-family:Arial;
padding:40px;
}

.container{
max-width:700px;
margin:auto;
background:#141420;
padding:40px;
border-radius:20px;
}

input,textarea{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:20px;
background:#111;
border:none;
border-radius:6px;
color:white;
}

button{
padding:15px;
width:100%;
background:#7b2cff;
border:none;
border-radius:10px;
color:white;
font-size:16px;
}

</style>

</head>

<body>

<div class="container">

<h1>Formulario Staff</h1>

<div id="user"></div>

<form id="form">

Edad
<input id="edad" required>

Situación 1
<textarea id="q1" required></textarea>

Situación 2
<textarea id="q2" required></textarea>

Situación 3
<textarea id="q3" required></textarea>

Situación 4
<textarea id="q4" required></textarea>

<button>Enviar</button>

</form>

</div>

<script>

const hash=new URLSearchParams(window.location.hash.slice(1))
const token=hash.get("access_token")

if(!token){

alert("Debes iniciar sesión con Discord")
window.location="index.html"

}

fetch("https://discord.com/api/users/@me",{

headers:{
Authorization:"Bearer "+token
}

})

.then(res=>res.json())
.then(user=>{

document.getElementById("user").innerHTML=
`Usuario verificado: ${user.username}#${user.discriminator}`

window.discordUser=user

})

document.getElementById("form").onsubmit=(e)=>{

e.preventDefault()

fetch("https://discord.com/api/webhooks/1479434819267199047/xlL5ulI0lMyGduFZI1mP33QwF9qNYkXH0GQhxUyEHLRufsPr5Z-gzyyur457wnXM57S3",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

embeds:[{

title:"Nueva postulación Abyssal",

fields:[

{name:"Usuario",value:window.discordUser.username},
{name:"ID",value:window.discordUser.id},
{name:"Edad",value:edad.value},
{name:"Situación 1",value:q1.value},
{name:"Situación 2",value:q2.value},
{name:"Situación 3",value:q3.value},
{name:"Situación 4",value:q4.value}

]

}]

})

})

alert("Postulación enviada")

}

</script>

</body>
</html>
