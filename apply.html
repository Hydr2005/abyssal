<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Solicitud Staff</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="form-card">

<h1>Solicitud Staff</h1>

<img id="avatar">
<p id="username"></p>

<div class="progress">
<div id="progress-bar"></div>
</div>

<form id="form">

<label>¿Cuantos años tienes?</label>
<input required name="edad">

<label>¿Cual es tu nombre en Discord?</label>
<input required name="discord">

<label>Dos miembros de Abyssal comienzan una discusión fuerte en público dentro del servidor. ¿Cómo manejarías la situación?</label>
<textarea required name="pregunta1"></textarea>

<label>Descubres que alguien del staff filtra información. ¿Qué harías?</label>
<textarea required name="pregunta2"></textarea>

<label>La comunidad protesta contra una nueva regla. ¿Cómo actuarías?</label>
<textarea required name="pregunta3"></textarea>

<label>Un staff abusa de permisos pero es amigo de admins. ¿Qué harías?</label>
<textarea required name="pregunta4"></textarea>

<button type="submit">Enviar solicitud</button>

</form>

</div>

<script src="script.js"></script>

</body>
</html>
